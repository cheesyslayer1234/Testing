<!doctype html>
<html>
  <head>
    <title>SW Notification Fixed</title>
  </head>

  <body style="font-family: sans-serif; text-align: center; margin-top: 80px">
    <h2>Service Worker Notification Test</h2>

    <button onclick="setup()">1. Enable Notifications</button>
    <button onclick="startTimer()">2. Start 10s Timer</button>

    <p id="status"></p>

    <script>
      let swRegistration;

      async function setup() {
        if (!("serviceWorker" in navigator)) {
          alert("Service Worker not supported");
          return;
        }

        const permission = await Notification.requestPermission();

        swRegistration = await navigator.serviceWorker.register("./sw.js");
        await navigator.serviceWorker.ready;

        document.getElementById("status").innerText =
          "Ready | Permission: " + permission;
      }

      function startTimer() {
        document.getElementById("status").innerText = "Timer running...";

        setTimeout(async () => {
          const reg = await navigator.serviceWorker.ready;

          const sw = reg.active || navigator.serviceWorker.controller;

          if (!sw) {
            alert("No active service worker");
            return;
          }

          if (Notification.permission !== "granted") {
            alert("No permission");
            return;
          }

          sw.postMessage({
            type: "NOTIFY",
            title: "WORKING?",
            body: "If you see this, it works 🎉",
          });
        }, 10000);
      }
    </script>
  </body>
</html>
