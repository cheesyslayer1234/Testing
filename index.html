<!doctype html>
<html>
  <head>
    <title>SW Fix</title>
  </head>

  <body style="font-family: sans-serif; text-align: center; margin-top: 80px">
    <h2>Fixed Notification Test</h2>

    <button onclick="setup()">Enable</button>
    <button onclick="runTimer()">Start 10s</button>

    <p id="status"></p>

    <script>
      let sw;

      async function setup() {
        if (!("serviceWorker" in navigator)) {
          alert("No SW support");
          return;
        }

        const perm = await Notification.requestPermission();
        console.log("Permission:", perm);

        sw = await navigator.serviceWorker.register("./sw.js");
        await navigator.serviceWorker.ready;

        document.getElementById("status").innerText =
          "SW ready + permission: " + perm;
      }

      function runTimer() {
        document.getElementById("status").innerText = "Running...";

        setTimeout(async () => {
          const reg = await navigator.serviceWorker.ready;

          if (Notification.permission !== "granted") {
            alert("No notification permission");
            return;
          }

          reg.active?.postMessage({
            type: "NOTIFY",
            title: "WORKS",
            body: "If you see this, it's fixed",
          });
        }, 10000);
      }
    </script>
  </body>
</html>
