<!doctype html>
<html>
  <head>
    <title>SW Proof Test</title>
  </head>

  <body style="font-family: sans-serif; text-align: center; margin-top: 80px">
    <h2>Service Worker Proof Test</h2>

    <button onclick="setup()">1. Enable</button>
    <button onclick="testNotify()">2. FORCE NOTIFICATION</button>

    <p id="status"></p>

    <script>
      let reg;

      async function setup() {
        if (!("serviceWorker" in navigator)) {
          alert("No SW support");
          return;
        }

        const perm = await Notification.requestPermission();

        reg = await navigator.serviceWorker.register("./sw.js");
        await navigator.serviceWorker.ready;

        document.getElementById("status").innerText =
          "Ready | Permission: " + perm;
      }

      async function testNotify() {
        const r = await navigator.serviceWorker.ready;

        // IMPORTANT: correct API is reg.showNotification
        r.showNotification("FORCED TEST", {
          body: "If you see this, everything is working",
          requireInteraction: true,
        });

        document.getElementById("status").innerText = "Notification triggered";
      }
    </script>
  </body>
</html>
