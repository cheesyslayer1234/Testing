<!doctype html>
<html>
  <head>
    <title>Pomofocus SW Timer</title>
  </head>

  <body style="font-family:sans-serif;text-align:center;margin-top:80px">
    <h2>SW Timer Notification (Proper Version)</h2>

    <button onclick="setup()">Enable</button>
    <button onclick="startTimer()">Start 10s Timer</button>

    <p id="status"></p>

    <script>
      let reg;

      async function setup() {
        if (!("serviceWorker" in navigator)) {
          alert("No SW support");
          return;
        }

        const perm = await Notification.requestPermission();

        reg = await navigator.serviceWorker.register("./sw.js");
        await navigator.serviceWorker.ready;

        document.getElementById("status").innerText =
          "Ready | Permission: " + perm;
      }

      function startTimer() {
        document.getElementById("status").innerText = "Timer started (SW owns it)";

        navigator.serviceWorker.ready.then((r) => {
          r.active.postMessage({
            type: "START_TIMER",
            delay: 10 // seconds
          });
        });
      }
    </script>
  </body>
</html>
