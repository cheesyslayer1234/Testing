<!doctype html>
<html>
  <head>
    <title>Notif Test</title>
  </head>
  <body style="font-family: sans-serif; text-align: center; margin-top: 100px">
    <h2>Notification Test</h2>

    <button onclick="enableNotif()">Enable Notifications</button>
    <button onclick="startTask()">Start 10s Task</button>

    <p id="status"></p>

    <script>
      async function enableNotif() {
        const permission = await Notification.requestPermission();
        document.getElementById("status").innerText =
          "Permission: " + permission;
      }

      function startTask() {
        document.getElementById("status").innerText = "Waiting 10s...";

        setTimeout(() => {
          if (Notification.permission === "granted") {
            new Notification("WORKING?", {
              body: "If you see this, it's fixed.",
            });
          } else {
            alert("Notifications not enabled");
          }
        }, 10000);
      }
    </script>
  </body>
</html>
