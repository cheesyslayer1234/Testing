<!doctype html>
<html>
  <head>
    <title>SW Notif Test</title>
  </head>

  <body style="font-family: sans-serif; text-align: center; margin-top: 80px">
    <h2>Service Worker Notification Test</h2>

    <button onclick="registerSW()">1. Enable App</button>
    <button onclick="startTimer()">2. Start 10s Timer</button>

    <p id="status"></p>

    <script>
      let swRegistration;

      async function registerSW() {
        if (!("serviceWorker" in navigator)) {
          alert("Service Worker not supported");
          return;
        }

        const permission = await Notification.requestPermission();
        document.getElementById("status").innerText =
          "Notification permission: " + permission;

        swRegistration = await navigator.serviceWorker.register("sw.js");
        console.log("SW registered");

        document.getElementById("status").innerText += " | SW registered";
      }

      function startTimer() {
        document.getElementById("status").innerText = "Timer started (10s)";

        setTimeout(() => {
          if (swRegistration && Notification.permission === "granted") {
            swRegistration.active.postMessage({
              type: "NOTIFY",
              title: "WORKING?",
              body: "Service Worker notification fired 🎉",
            });
          } else {
            alert("SW not ready or permission denied");
          }
        }, 10000);
      }
    </script>
  </body>
</html>
